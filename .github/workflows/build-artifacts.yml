name: Build Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured. APK will use the runner debug key and will not update existing installs."
            exit 0
          fi
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "Android signing secrets are incomplete."
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/release-keystore.jks
          {
            printf 'storePassword=%s\n' "${ANDROID_KEYSTORE_PASSWORD}"
            printf 'keyPassword=%s\n' "${ANDROID_KEY_PASSWORD}"
            printf 'keyAlias=%s\n' "${ANDROID_KEY_ALIAS}"
            printf 'storeFile=release-keystore.jks\n'
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          mkdir -p pack
          cp build/app/outputs/flutter-apk/app-release.apk "pack/EZVenera-${version}-android-release.apk"
          sha256sum "pack/EZVenera-${version}-android-release.apk" > "pack/EZVenera-${version}-android-release.apk.sha256"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: ezvenera-android
          path: |
            pack/*.apk
            pack/*.sha256

  windows:
    name: Windows Setup
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        shell: powershell
        run: flutter pub get

      - name: Build Windows setup
        shell: powershell
        run: |
          $projectRoot = (Get-Location).Path
          $outputRoot = Join-Path $projectRoot 'pack'
          .\scripts\build_release.ps1 `
            -ProjectRoot $projectRoot `
            -OutputRoot $outputRoot `
            -NsisPath 'C:\Program Files (x86)\NSIS\makensis.exe' `
            -SkipAndroid

      - name: Hash Windows setup
        shell: powershell
        run: |
          Get-ChildItem -Path pack -Filter '*.exe' | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Set-Content -Path "$($_.FullName).sha256"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ezvenera-windows
          path: |
            pack/*.exe
            pack/*.sha256

  ios:
    name: iOS Unsigned IPA
    runs-on: macos-15
    continue-on-error: true
    env:
      MIN_IOS_SDK: "26"
      XCODE_VERSION: "26.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          xcode_path="/Applications/Xcode_${XCODE_VERSION}.app"
          if [[ ! -d "${xcode_path}" ]]; then
            echo "Requested Xcode was not found: ${xcode_path}"
            echo "Installed Xcode applications:"
            ls -1d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select --switch "${xcode_path}"
          xcode-select -p
          xcodebuild -version

      - name: Verify iOS SDK requirement
        shell: bash
        run: |
          set -euo pipefail
          sdk_version="$(xcodebuild -version -sdk iphoneos SDKVersion)"
          echo "iPhoneOS SDK: ${sdk_version}"
          if [[ "${sdk_version%%.*}" -lt "${MIN_IOS_SDK}" ]]; then
            echo "iOS builds must use the iOS ${MIN_IOS_SDK} SDK or newer."
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          cd ios
          pod install

      - name: Build iOS without code signing
        run: flutter build ios --release --no-codesign

      - name: Verify app bundle is unsigned
        shell: bash
        run: |
          set -euo pipefail
          if codesign --verify --deep --strict build/ios/iphoneos/Runner.app >/dev/null 2>&1; then
            echo "Runner.app unexpectedly contains a valid code signature."
            exit 1
          fi
          echo "Runner.app is not codesigned by this workflow."

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          staging="pack/unsigned-ipa"
          mkdir -p "${staging}/Payload" pack
          cp -R build/ios/iphoneos/Runner.app "${staging}/Payload/Runner.app"
          (cd "${staging}" && ditto -c -k --sequesterRsrc --keepParent Payload "../EZVenera-${version}-ios-unsigned.ipa")
          shasum -a 256 "pack/EZVenera-${version}-ios-unsigned.ipa" > "pack/EZVenera-${version}-ios-unsigned.ipa.sha256"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ezvenera-ios-unsigned
          path: |
            pack/*.ipa
            pack/*.sha256
