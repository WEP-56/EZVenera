name: Build Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured. APK will use the runner debug key and will not update existing installs."
            exit 0
          fi
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "Android signing secrets are incomplete."
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/release-keystore.jks
          {
            printf 'storePassword=%s\n' "${ANDROID_KEYSTORE_PASSWORD}"
            printf 'keyPassword=%s\n' "${ANDROID_KEY_PASSWORD}"
            printf 'keyAlias=%s\n' "${ANDROID_KEY_ALIAS}"
            printf 'storeFile=release-keystore.jks\n'
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      # Per-ABI APKs (armeabi-v7a + arm64-v8a) keep download size smaller
      # than a fat APK that embeds every architecture.
      - name: Build release APKs (split per ABI)
        run: >
          flutter build apk --release --split-per-abi
          --target-platform android-arm,android-arm64

      - name: Collect APKs
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          mkdir -p pack
          for abi in armeabi-v7a arm64-v8a; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [[ ! -f "$src" ]]; then
              echo "Missing split APK for ABI ${abi}: ${src}"
              exit 1
            fi
            dest="pack/EZVenera-${version}-android-${abi}-release.apk"
            cp "$src" "$dest"
            sha256sum "$dest" > "${dest}.sha256"
          done
          ls -lh pack/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: ezvenera-android
          path: |
            pack/*.apk
            pack/*.sha256

  windows:
    name: Windows Setup
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        shell: powershell
        run: flutter pub get

      - name: Build Windows setup
        shell: powershell
        run: |
          $projectRoot = (Get-Location).Path
          $outputRoot = Join-Path $projectRoot 'pack'
          .\scripts\build_release.ps1 `
            -ProjectRoot $projectRoot `
            -OutputRoot $outputRoot `
            -NsisPath 'C:\Program Files (x86)\NSIS\makensis.exe' `
            -SkipAndroid

      - name: Hash Windows setup
        shell: powershell
        run: |
          Get-ChildItem -Path pack -Filter '*.exe' | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Set-Content -Path "$($_.FullName).sha256"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ezvenera-windows
          path: |
            pack/*.exe
            pack/*.sha256
