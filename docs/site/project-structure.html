<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZVenera 项目结构</title>
  <style>
    :root {
      --bg: #f4f7f5;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --text: #17312c;
      --muted: #556c65;
      --line: rgba(23, 49, 44, 0.12);
      --accent: #1c8f73;
      --accent-soft: rgba(28, 143, 115, 0.1);
      --shadow: 0 18px 48px rgba(20, 49, 42, 0.08);
      --max: 1040px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(28, 143, 115, 0.12), transparent 28%),
        linear-gradient(180deg, #eef4f1 0%, var(--bg) 100%);
      font: 16px/1.7 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 24px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .brand {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .topnav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topnav a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .topnav a:hover {
      color: var(--accent);
      border-color: rgba(28, 143, 115, 0.3);
      background: rgba(28, 143, 115, 0.08);
    }

    .hero,
    .placeholder {
      margin-top: 20px;
      border: 1px solid var(--line);
      background: var(--surface);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 40px 36px 30px;
      border-radius: 20px 20px 0 0;
      background:
        linear-gradient(135deg, rgba(28, 143, 115, 0.16), rgba(18, 54, 47, 0.04)),
        var(--surface-strong);
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.12;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      max-width: 760px;
    }

    .placeholder {
      padding: 28px 30px 34px;
      border-top: 0;
      border-radius: 0 0 20px 20px;
    }

    .placeholder h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .placeholder p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .notice {
      padding: 16px 18px;
      border-radius: 14px;
      background: rgba(28, 143, 115, 0.08);
      color: #235b4e;
      border: 1px solid rgba(28, 143, 115, 0.12);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      font-weight: 700;
    }

    .actions a:hover {
      color: var(--accent);
      border-color: rgba(28, 143, 115, 0.3);
      background: rgba(28, 143, 115, 0.08);
    }

    @media (max-width: 720px) {
      .shell {
        width: min(calc(100% - 20px), var(--max));
        padding-top: 12px;
      }

      .topbar {
        padding: 12px 14px;
      }

      .topnav a {
        min-height: 38px;
        padding: 0 12px;
      }

      .hero {
        padding: 30px 22px 22px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .placeholder {
        padding: 22px 20px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">EZVenera Docs</div>
      <nav class="topnav" aria-label="站点导航">
        <a href="./index.html">主页</a>
        <a href="./plugin-guide.html">制作插件</a>
        <a href="./project-structure.html">项目结构</a>
      </nav>
    </div>

    <section class="hero">
      <h1>EZVenera 项目结构</h1>
      <p>这个页面先保留为占位入口，后续可以扩成完整的开发接手文档，包括目录结构、运行流程、核心模块、持久化、与原项目差异以及构建发布说明。</p>
    </section>

    <section class="placeholder">
      <h2>页面占位</h2>
      <p>当前还没有把项目结构文档的正文转成 HTML。站点结构已经预留好了，后续只需要把 Markdown 内容继续填进来。</p>
      <div class="notice">
        这个页面保留了稳定 URL，可以直接放进 GitHub Pages 导航中，不会影响后续补正文。
      </div>
      <div class="actions">
        <a href="./plugin-guide.html">查看插件制作文档</a>
        <a href="./index.html">返回主页</a>
        <a href="https://github.com/WEP-56/EZVenera" target="_blank" rel="noreferrer">打开 GitHub 仓库</a>
      </div>
    </section>
  </div>
</body>
</html>
